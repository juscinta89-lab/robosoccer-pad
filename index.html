<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0e1620">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ROBOSOCCER Pad</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/favicon.png">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<style>
  :root{
    --bg:#0e1620; --panel:#16212e; --panel-2:#1d2c3c;
    --line:#27384a; --muted:#7e93a6; --text:#e7f0f7;
    --cyan:#22d3ee; --amber:#f5a524; --red:#ef5350; --green:#34d399;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;overflow:hidden;}
  body{
    background:radial-gradient(900px 520px at 82% -12%, #122433 0, transparent 60%), var(--bg);
    color:var(--text);
    font-family:ui-sans-serif,system-ui,"Segoe UI",Roboto,sans-serif;
    touch-action:none; user-select:none;
    display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .mono{font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;}

  header{
    display:flex; align-items:center; gap:8px;
    padding:8px 14px; border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,var(--panel),transparent); flex:0 0 auto;
  }
  .brand{display:flex; flex-direction:column; line-height:1; margin-right:auto;}
  .brand b{font-size:15px; letter-spacing:3px; font-weight:800;}
  .brand span{font-size:8px; letter-spacing:4px; color:var(--muted); margin-top:5px;}
  .brand .dot{color:var(--amber);}
  .status{display:flex; align-items:center; gap:7px; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted);}
  .led{width:10px;height:10px;border-radius:50%;background:var(--red);}
  .led.on{background:var(--green); box-shadow:0 0 12px 1px rgba(52,211,153,.7);}
  .btn{
    border:1px solid var(--line); background:var(--panel-2); color:var(--text);
    font:inherit; font-size:13px; letter-spacing:1px; font-weight:700;
    padding:9px 15px; border-radius:10px; cursor:pointer;
    transition:transform .06s ease, border-color .15s, background .15s;
  }
  .btn:active{transform:translateY(1px);}
  .btn.primary{border-color:var(--cyan); color:#062a33; background:var(--cyan);}
  .btn.danger{border-color:var(--red); color:var(--red); background:transparent;}
  .icon-btn{
    width:40px;height:40px;padding:0;display:flex;align-items:center;justify-content:center;
    font-size:18px;border:1px solid var(--line);background:var(--panel-2);color:var(--text);
    border-radius:10px;cursor:pointer;
  }
  .icon-btn.amber{border-color:var(--amber);color:var(--amber);}
  .hidden{display:none !important;}

  /* ---- Grid susun ikut orientasi ---- */
  main{flex:1; min-height:0; display:grid; gap:10px; padding:10px 16px 12px;}
  @media (orientation:portrait){
    main{grid-template-columns:1fr 1fr; grid-template-areas:"center center" "left right"; align-content:space-between;}
  }
  @media (orientation:landscape){
    main{grid-template-columns:auto 1fr auto; grid-template-areas:"left center right"; align-items:center;}
  }

  .center{grid-area:center; display:flex; flex-direction:column; align-items:center; gap:12px; justify-content:center;}
  .rail{display:flex; gap:12px; justify-content:center; flex-wrap:wrap;}
  .gauge{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:9px 14px; width:150px;}
  .gauge .lbl{font-size:9px; letter-spacing:3px; color:var(--muted); text-transform:uppercase;}
  .gauge .val{font-size:24px; font-weight:700; margin-top:2px;}
  .gauge .val.pos{color:var(--cyan);} .gauge .val.neg{color:var(--amber);}
  .bar{height:5px; background:#0c1620; border-radius:4px; margin-top:6px; position:relative; overflow:hidden;}
  .bar i{position:absolute; top:0; bottom:0; left:50%; width:0; background:var(--cyan); transition:width .04s linear, left .04s linear;}

  .pad-wrap{display:flex; flex-direction:column; align-items:center; gap:8px; justify-content:center;}
  .pad-wrap.left{grid-area:left;} .pad-wrap.right{grid-area:right;}
  .cap{font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; text-align:center;}
  .cap b{color:var(--text); font-weight:700;}

  .stick{
    --size:min(40vw,36vh,240px); width:var(--size); height:var(--size);
    border-radius:50%; position:relative; touch-action:none;
    background:radial-gradient(circle at 50% 42%, var(--panel-2), var(--panel) 70%);
    border:1px solid var(--line);
    box-shadow:inset 0 2px 20px rgba(0,0,0,.55), 0 10px 36px rgba(0,0,0,.4);
  }
  .stick .guide{position:absolute; background:#2c4055; border-radius:2px;}
  .stick.vert .guide{left:50%; top:12%; bottom:12%; width:2px; transform:translateX(-1px);}
  .stick.horz .guide{top:50%; left:12%; right:12%; height:2px; transform:translateY(-1px);}
  .stick .ar{position:absolute; color:#3a5269; font-size:13px; line-height:1;}
  .stick.vert .ar.a{top:7%; left:50%; transform:translateX(-50%);}
  .stick.vert .ar.b{bottom:7%; left:50%; transform:translateX(-50%);}
  .stick.horz .ar.a{left:7%; top:50%; transform:translateY(-50%);}
  .stick.horz .ar.b{right:7%; top:50%; transform:translateY(-50%);}
  .knob{
    position:absolute; left:50%; top:50%; width:36%; height:36%;
    transform:translate(-50%,-50%); border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #33485e, #1a2836 72%);
    border:1px solid #3a5269;
    box-shadow:0 6px 18px rgba(0,0,0,.55), inset 0 1px 1px rgba(255,255,255,.08);
  }
  .stick.live{border-color:var(--amber);}
  .stick.live .knob{box-shadow:0 6px 18px rgba(0,0,0,.55), 0 0 24px 4px rgba(245,165,36,.55), inset 0 1px 1px rgba(255,255,255,.1);}
</style>
</head>
<body>

<header>
  <div class="brand"><b>ROBOSOCCER<span class="dot">.</span></b><span>TWIN-STICK PAD</span></div>
  <button class="icon-btn" id="fsBtn" title="Skrin penuh">⛶</button>
  <button class="icon-btn amber hidden" id="installBtn" title="Pasang app">⤓</button>
  <div class="status"><i class="led" id="led"></i><span id="statusText">PUTUS</span></div>
  <button class="btn primary" id="connectBtn">SAMBUNG</button>
</header>

<main>
  <div class="pad-wrap left">
    <div class="stick vert" id="stickL">
      <div class="guide"></div><span class="ar a">▲</span><span class="ar b">▼</span>
      <div class="knob" id="knobL"></div>
    </div>
    <div class="cap"><b>PACU</b> · depan / belakang</div>
  </div>

  <div class="center">
    <div class="rail">
      <div class="gauge"><div class="lbl">Pacu Y</div><div class="val mono" id="valY">0</div><div class="bar"><i id="barY"></i></div></div>
      <div class="gauge"><div class="lbl">Pusing X</div><div class="val mono" id="valX">0</div><div class="bar"><i id="barX"></i></div></div>
    </div>
    <button class="btn danger" id="stopBtn">BERHENTI KECEMASAN</button>
  </div>

  <div class="pad-wrap right">
    <div class="stick horz" id="stickR">
      <div class="guide"></div><span class="ar a">◀</span><span class="ar b">▶</span>
      <div class="knob" id="knobR"></div>
    </div>
    <div class="cap"><b>PUSING</b> · kiri / kanan</div>
  </div>
</main>

<script>
const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const RX_UUID      = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

let device=null, rxChar=null, connected=false;
let curX=0, curY=0, lastSent='', inflight=false;
const $ = id => document.getElementById(id);
const led=$('led'), statusText=$('statusText'), connectBtn=$('connectBtn');
const valX=$('valX'), valY=$('valY'), barX=$('barX'), barY=$('barY');

/* ---- Skrin penuh + kunci landscape ---- */
const fsBtn=$('fsBtn');
function inFS(){ return document.fullscreenElement || document.webkitFullscreenElement; }
async function toggleFS(){
  try{
    if(!inFS()){
      const el=document.documentElement;
      if(el.requestFullscreen) await el.requestFullscreen();
      else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      try{ await screen.orientation.lock('landscape'); }catch(_){}
    }else{
      try{ screen.orientation.unlock(); }catch(_){}
      if(document.exitFullscreen) await document.exitFullscreen();
      else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
  }catch(e){}
}
fsBtn.onclick=toggleFS;
document.addEventListener('fullscreenchange',()=>{ fsBtn.textContent = inFS()?'🡼':'⛶'; });

/* ---- Install PWA ---- */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; $('installBtn').classList.remove('hidden'); });
$('installBtn').onclick=async()=>{ if(!deferredPrompt)return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; $('installBtn').classList.add('hidden'); };
window.addEventListener('appinstalled',()=>$('installBtn').classList.add('hidden'));

/* ---- Service worker ---- */
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{})); }

/* ---- BLE ---- */
async function connect(){
  if(!navigator.bluetooth){ alert('Browser ini tiada Web Bluetooth. Guna Chrome di Android, atau Bluefy di iPhone.'); return; }
  try{
    statusText.textContent='MENCARI...';
    device = await navigator.bluetooth.requestDevice({ filters:[{services:[SERVICE_UUID]}] });
    device.addEventListener('gattserverdisconnected', ()=>setConnected(false));
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    rxChar  = await service.getCharacteristic(RX_UUID);
    setConnected(true);
  }catch(e){ statusText.textContent='PUTUS'; if(e.name!=='NotFoundError') alert('Gagal sambung: '+e.message); }
}
function setConnected(s){
  connected=s; led.classList.toggle('on',s);
  statusText.textContent = s?'SAMBUNG':'PUTUS';
  connectBtn.textContent = s?'PUTUS':'SAMBUNG';
}
connectBtn.onclick = ()=>{ if(connected && device?.gatt?.connected) device.gatt.disconnect(); else connect(); };

setInterval(()=>{
  if(!connected || !rxChar || inflight) return;
  const msg = curX+','+curY;
  if(msg===lastSent && curX===0 && curY===0) return;
  lastSent=msg; inflight=true;
  const data=new TextEncoder().encode(msg);
  const p = rxChar.writeValueWithoutResponse ? rxChar.writeValueWithoutResponse(data) : rxChar.writeValue(data);
  p.catch(()=>{}).finally(()=>{ inflight=false; });
}, 45);

function paint(){
  valX.textContent=curX; valY.textContent=curY;
  valX.className='val mono '+(curX>=0?'pos':'neg');
  valY.className='val mono '+(curY>=0?'pos':'neg');
  barX.style.width=Math.abs(curX)/2+'%'; barX.style.left=curX>=0?'50%':(50-Math.abs(curX)/2)+'%';
  barY.style.width=Math.abs(curY)/2+'%'; barY.style.left=curY>=0?'50%':(50-Math.abs(curY)/2)+'%';
}

class Stick{
  constructor(el, knob, axis){
    this.el=el; this.knob=knob; this.axis=axis;
    this.cx=0; this.cy=0; this.R=0; this.active=false;
    el.addEventListener('pointerdown',e=>{el.setPointerCapture(e.pointerId);this.start(e);});
    el.addEventListener('pointermove',e=>this.move(e));
    el.addEventListener('pointerup',()=>this.end());
    el.addEventListener('pointercancel',()=>this.end());
  }
  rect(){const r=this.el.getBoundingClientRect();this.cx=r.left+r.width/2;this.cy=r.top+r.height/2;this.R=r.width/2*0.78;}
  start(e){this.rect();this.active=true;this.el.classList.add('live');this.move(e);}
  move(e){
    if(!this.active)return;
    const t=e.touches?e.touches[0]:e;
    let dx=t.clientX-this.cx, dy=t.clientY-this.cy;
    if(this.axis==='y') dx=0; else dy=0;
    dx=Math.max(-this.R,Math.min(this.R,dx));
    dy=Math.max(-this.R,Math.min(this.R,dy));
    this.knob.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    if(this.axis==='y') curY=Math.round(-dy/this.R*100);
    else                curX=Math.round( dx/this.R*100);
    paint();
  }
  end(){
    this.active=false;this.el.classList.remove('live');
    this.knob.style.transform='translate(-50%,-50%)';
    if(this.axis==='y') curY=0; else curX=0;
    paint();
  }
}
new Stick($('stickL'), $('knobL'), 'y');
new Stick($('stickR'), $('knobR'), 'x');

$('stopBtn').onclick=()=>{
  curX=0; curY=0; lastSent='';
  $('knobL').style.transform='translate(-50%,-50%)';
  $('knobR').style.transform='translate(-50%,-50%)';
  paint();
};
paint();
</script>
</body>
</html>
